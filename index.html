<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>頭城農場 | 高鐵延伸宜蘭產業影響分析</title>
    <style>
        body { font-family: "Noto Sans TC", sans-serif; line-height: 1.8; padding: 20px; background: #F6F3EE; color: #222; }
        .section { background: white; padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-title { color: #4A90E2; margin-bottom: 20px; border-left: 5px solid #4A90E2; padding-left: 10px; }
        .bar { margin-bottom: 20px; }
        .bar-title { font-weight: bold; margin-bottom: 5px; }
        .bar-bg { background: #eee; height: 20px; border-radius: 10px; overflow: hidden; }
        .bar-fill { background: #4CAF50; height: 20px; border-radius: 10px; }
        .swot-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .swot-card { padding: 20px; border-radius: 10px; color: white; }
        .s { background: #2ecc71; } .w { background: #e67e22; }
        .o { background: #3498db; } .t { background: #e74c3c; }
        footer { text-align: center; margin-top: 40px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

<section class="section">
    <h2 class="section-title">經營績效數據</h2>
    <div class="bar">
        <div class="bar-title">餐飲收入 +2.9%</div>
        <div class="bar-bg"><div class="bar-fill" style="width:20%"></div></div>
    </div>
    <div class="bar">
        <div class="bar-title">農場體驗參與度 +8%</div>
        <div class="bar-bg"><div class="bar-fill" style="width:8%"></div></div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">SWOT 分析</h2>
    <div class="swot-grid">
        <div class="swot-card s"><h3>S 優勢</h3><p>47年品牌、GSTC認證、120公頃完整生態場域。</p></div>
        <div class="swot-card w"><h3>W 劣勢</h3><p>交通不便、國際客比例低、人力招募困難。</p></div>
        <div class="swot-card o"><h3>O 機會</h3><p>ESG市場成長、國際旅遊、高鐵低碳運輸。</p></div>
        <div class="swot-card t"><h3>T 威脅</h3><p>快閃化、一日生活圈、溪北邊緣化風險。</p></div>
    </div>
</section>

<footer>
    <h2>頭城農場 × 高鐵延伸宜蘭分析報告</h2>
    <p>本網站整合高鐵延伸宜蘭計畫、日本新幹線案例、永續觀光與 ESG 發展分析。</p>
</footer>

</body>
</html>
