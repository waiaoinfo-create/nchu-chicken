<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頭城農場｜高鐵延伸宜蘭產業影響分析</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Noto Sans TC", sans-serif;
    background:#F6F3EE;
    color:#222;
    line-height:1.8;
}

header{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px;
    gap:60px;
    background:linear-gradient(135deg,#1F4D3A,#2F6B53);
    color:white;
}

.hero-left{
    flex:1;
}

.hero-right{
    flex:1;
}

.hero-right img{
    width:100%;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h1{
    font-size:64px;
    line-height:1.3;
    margin-bottom:30px;
}

.hero-text{
    font-size:22px;
    opacity:0.9;
    margin-bottom:40px;
}

.hero-btn{
    display:inline-block;
    background:#E98B2A;
    color:white;
    padding:18px 40px;
    border-radius:999px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

.section{
    padding:100px 80px;
}

.section-title{
    font-size:42px;
    margin-bottom:60px;
    color:#1F4D3A;
    text-align:center;
}

.kpi-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
    margin-top:50px;
}
</html>
